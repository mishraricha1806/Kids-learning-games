<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#3f8cff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BrightSteps">
    <title>BrightSteps Kids Learning Games</title>
    <link rel="manifest" href="app.webmanifest">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Game library">
        <div class="brand">
          <svg class="brand-mark" viewBox="0 0 80 80" aria-hidden="true">
            <rect x="6" y="6" width="68" height="68" rx="18" fill="#ffffff" opacity="0.92"></rect>
            <path d="M20 58c8-13 17-19 28-19s21 6 32 19" fill="#7fe3a1" opacity="0.9"></path>
            <circle cx="42" cy="34" r="18" fill="#ffcf4a"></circle>
            <circle cx="35" cy="32" r="3.4" fill="#25324d"></circle>
            <circle cx="49" cy="32" r="3.4" fill="#25324d"></circle>
            <path d="M35 42c4 5 11 5 15 0" fill="none" stroke="#25324d" stroke-width="3.8" stroke-linecap="round"></path>
            <path d="M16 21l3 7 8 1-6 5 2 8-7-4-7 4 2-8-6-5 8-1z" fill="#ff8a7a"></path>
            <path d="M62 14l2 5 6 1-4 4 1 6-5-3-5 3 1-6-4-4 6-1z" fill="#3f8cff"></path>
          </svg>
          <div>
            <h1>BrightSteps</h1>
            <p>Ages 1-9</p>
          </div>
        </div>

        <section class="kid-greeting" id="kidGreeting" aria-label="Child greeting">
          <span class="greeting-sun" aria-hidden="true"></span>
          <div>
            <p id="greetingLine">Welcome, friend</p>
            <button class="name-edit-button" id="editChildName" type="button">Set name</button>
          </div>
        </section>

        <button class="install-button" id="installButton" hidden>Install App</button>
        <button class="parent-entry" id="parentEntry">Parent area</button>

        <section class="age-picker" aria-label="Age range">
          <button class="age-button is-active" data-age="tiny">1-3</button>
          <button class="age-button" data-age="little">4-6</button>
          <button class="age-button" data-age="big">7-9</button>
        </section>

        <section class="daily-path" id="dailyPath" aria-label="Daily learning path"></section>

        <nav class="game-list" id="gameList" aria-label="Games"></nav>

        <section class="parent-note" aria-label="Parent insight">
          <h2>Parent view</h2>
          <p id="parentNote">Playful taps, bright feedback, and short rounds help toddlers learn colors, shapes, and words.</p>
        </section>
      </aside>

      <section class="stage" aria-live="polite">
        <header class="stage-header">
          <div>
            <p class="eyebrow" id="categoryLabel">Colors</p>
            <h2 id="gameTitle">Color Pop</h2>
          </div>
          <div class="score-card">
            <span>Stars</span>
            <strong id="stars">0</strong>
            <small>Total <b id="totalStars">0</b></small>
          </div>
        </header>

        <section class="activity-card" id="activity" aria-label="Current game"></section>
      </section>
    </main>
    <div class="modal-root" id="modalRoot" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
